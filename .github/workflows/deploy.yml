name: Deploy

# Runs after CI succeeds on master. Stays dormant until you opt in by setting the
# repository variable DEPLOY_ENABLED=true and adding the DROPLET_* secrets.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to droplet over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DROPLET_PATH }}"
            git pull --ff-only origin master
            bash deploy/deploy.sh
