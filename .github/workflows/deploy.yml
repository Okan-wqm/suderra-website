name: Deploy

# Runs after CI succeeds on master. Stays dormant until you opt in by setting the
# repository variable DEPLOY_ENABLED=true and adding the DROPLET_* secrets.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to droplet over SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5 (SHA-pinned)
        env:
          DROPLET_PATH: ${{ secrets.DROPLET_PATH }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: DROPLET_PATH
          script: |
            set -e
            cd "$DROPLET_PATH"          # passed via env, not YAML-interpolated
            git pull --ff-only origin master
            bash deploy/deploy.sh
